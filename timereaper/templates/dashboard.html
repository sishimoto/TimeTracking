<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeReaper - 稼働時間ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-orange: #f0883e;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-cyan: #39d2c0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: "⏱";
            font-size: 28px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-links a:hover {
            background: var(--bg-card);
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-nav button {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .date-nav button:hover {
            background: var(--bg-card);
        }

        .date-nav input[type="date"] {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        /* Update Banner */
        .update-banner {
            display: none;
            background: linear-gradient(135deg, #1a3a2a, #162d22);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 16px;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .update-banner.visible { display: flex; }
        .update-banner .update-icon { font-size: 20px; }
        .update-banner .update-text { flex: 1; }
        .update-banner .update-text strong { color: var(--accent-green); }
        .update-banner .update-actions { display: flex; gap: 8px; }
        .update-banner .update-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.2s;
        }
        .update-banner .update-btn:hover { opacity: 0.85; }
        .update-btn-primary {
            background: var(--accent-green);
            color: #0d1117;
            font-weight: 600;
        }
        .update-btn-secondary {
            background: transparent;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary);
        }
        .update-btn-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card .sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-card.blue .value { color: var(--accent-blue); }
        .stat-card.green .value { color: var(--accent-green); }
        .stat-card.purple .value { color: var(--accent-purple); }
        .stat-card.orange .value { color: var(--accent-orange); }

        .stat-card.clickable { cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
        .stat-card.clickable:hover { border-color: var(--accent-blue); transform: translateY(-2px); }

        /* Grid layout */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .grid-full {
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Timeline */
        .timeline {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .timeline::-webkit-scrollbar {
            width: 6px;
        }

        .timeline::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-time {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
            font-family: 'SF Mono', monospace;
        }

        .timeline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-app {
            font-size: 14px;
            font-weight: 500;
        }

        .timeline-title {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 400px;
        }

        .timeline-tab {
            font-size: 11px;
            color: var(--accent-cyan);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 400px;
            margin-top: 2px;
        }

        .timeline-tags {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        .tag.project { border-color: var(--accent-blue); color: var(--accent-blue); }
        .tag.phase { border-color: var(--accent-purple); color: var(--accent-purple); }
        .tag.idle { border-color: var(--accent-red); color: var(--accent-red); }

        /* App list */
        .app-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .app-item:last-child { border-bottom: none; }

        .app-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .app-name {
            font-size: 14px;
            font-weight: 500;
        }

        .app-time {
            font-size: 14px;
            color: var(--text-secondary);
            font-family: 'SF Mono', monospace;
        }

        .app-bar {
            height: 4px;
            background: var(--accent-blue);
            border-radius: 2px;
            margin-top: 6px;
            transition: width 0.3s ease;
        }

        /* Calendar events */
        .event-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .event-time {
            font-size: 12px;
            color: var(--accent-cyan);
            min-width: 100px;
            font-family: 'SF Mono', monospace;
        }

        .event-title {
            font-size: 14px;
        }

        .event-attendees {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Status indicator */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .container { padding: 12px; }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .header-left { flex-wrap: wrap; }
            header h1 { font-size: 20px; }
            header h1::before { font-size: 22px; }
            .nav-links { width: 100%; }
            .nav-links a { flex: 1; text-align: center; font-size: 12px; padding: 5px 6px; }
            .date-nav {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
            }
            .date-nav button, .date-nav input[type="date"] {
                font-size: 12px;
                padding: 4px 8px;
            }

            .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-card { padding: 12px; }
            .stat-card .value { font-size: 22px; }

            .heatmap, .heatmap-labels {
                grid-template-columns: repeat(12, 1fr);
                overflow-x: auto;
            }

            .timeline-title, .timeline-tab { max-width: 200px; }
            .timeline { max-height: 400px; }
            .app-list { max-height: 300px; }

            .chart-container { height: 250px; }

            .modal { min-width: auto; max-width: 90vw; padding: 16px; }

            .update-banner { flex-direction: column; gap: 8px; align-items: flex-start; }
            .update-actions { width: 100%; justify-content: flex-start; }
        }

        /* Hourly heatmap */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 10px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            min-height: 24px;
        }

        .heatmap-cell:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
        }

        .heatmap-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 4px;
        }

        .heatmap-labels span {
            text-align: center;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Tag Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            min-width: 400px;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .modal h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
        }
        .modal-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
        }
        .modal-info div { margin: 2px 0; }
        .modal-field {
            margin-bottom: 14px;
        }
        .modal-field label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal-field select {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }
        .modal-field select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-actions button {
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }
        .modal-actions button.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }
        .modal-actions button:hover { opacity: 0.85; }
        .modal-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent-green);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        .timeline-item { cursor: pointer; }
        .timeline-item:hover { background: var(--bg-secondary); border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <h1>TimeReaper <span id="versionBadge" style="font-size: 11px; font-weight: 400; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); padding: 2px 8px; border-radius: 10px; vertical-align: middle; margin-left: 4px;"></span></h1>
                    <div class="status-bar" style="margin-left: 8px;">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">監視中</span>
                    </div>
                </div>
                <div class="nav-links">
                    <a href="#" id="summaryLink" style="color: var(--accent-blue);">📋 サマリー</a>
                    <a href="/weekly" style="color: var(--accent-purple);">📊 週次</a>
                    <a href="/settings" style="color: var(--accent-orange);">⚙ 設定</a>
                </div>
            </div>
            <div class="date-nav">
                <button onclick="changeDate(-1)">← 前日</button>
                <input type="date" id="datePicker" onchange="loadDate(this.value)">
                <button onclick="changeDate(1)">翌日 →</button>
                <button onclick="loadToday()">今日</button>
            </div>
        </header>

        <!-- Update Banner -->
        <div class="update-banner" id="updateBanner">
            <span class="update-icon">🚀</span>
            <div class="update-text">
                新バージョン <strong id="updateVersion"></strong> が利用可能です
                <span id="updateNotes" style="color: var(--text-secondary); margin-left: 8px;"></span>
            </div>
            <div class="update-actions">
                <button class="update-btn update-btn-primary" onclick="performUpdate()">アップデート</button>
                <a href="#" id="updateReleaseLink" target="_blank" class="update-btn update-btn-secondary" style="text-decoration:none;">詳細</a>
                <button class="update-btn-close" onclick="dismissUpdate()">&times;</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card blue">
                <div class="label">合計作業時間</div>
                <div class="value" id="totalTime">--</div>
                <div class="sub" id="totalTimeSub"></div>
            </div>
            <div class="stat-card green clickable" onclick="document.getElementById('sectionAppUsage').scrollIntoView({behavior:'smooth'})">
                <div class="label">アプリ数</div>
                <div class="value" id="appCount">--</div>
                <div class="sub">使用アプリケーション</div>
            </div>
            <div class="stat-card purple">
                <div class="label">現在の作業</div>
                <div class="value" id="mainPhase">--</div>
                <div class="sub" id="mainPhaseSub"></div>
            </div>
            <div class="stat-card orange clickable" onclick="document.getElementById('sectionProject').scrollIntoView({behavior:'smooth'})">
                <div class="label">プロジェクト数</div>
                <div class="value" id="projectCount">--</div>
                <div class="sub">識別されたプロジェクト</div>
            </div>
        </div>

        <!-- Hourly Heatmap -->
        <div class="grid-full">
            <div class="card">
                <h2>📊 時間帯別アクティビティ</h2>
                <div class="heatmap" id="heatmap"></div>
                <div class="heatmap-labels" id="heatmapLabels"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid-2col">
            <!-- Timeline -->
            <div class="card">
                <h2>📋 タイムライン</h2>
                <div class="timeline" id="timeline">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>データがありません</p>
                    </div>
                </div>
            </div>

            <!-- Calendar Events -->
            <div class="card">
                <h2>📅 カレンダーイベント</h2>
                <div id="calendarEvents">
                    <div class="empty-state">
                        <div class="icon">📅</div>
                        <p>カレンダー連携が設定されていません</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-2col">
            <!-- App Usage -->
            <div class="card" id="sectionAppUsage">
                <h2>💻 アプリ使用時間</h2>
                <div class="app-list" id="appList">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>データがありません</p>
                    </div>
                </div>
            </div>

            <!-- Work Phase Breakdown -->
            <div class="card">
                <h2>🏷 作業工程の内訳</h2>
                <div class="chart-container">
                    <canvas id="phaseChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Project Chart -->
        <div class="grid-full">
            <div class="card" id="sectionProject">
                <h2>📁 プロジェクト別作業時間</h2>
                <div class="chart-container">
                    <canvas id="projectChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Tag Edit Modal -->
    <div class="modal-overlay" id="tagModal">
        <div class="modal">
            <h3>🏷 タグを編集</h3>
            <div class="modal-info" id="tagModalInfo"></div>
            <div class="modal-field">
                <label>作業工程（タスク分類）</label>
                <select id="editWorkPhase"></select>
            </div>
            <div class="modal-field">
                <label>プロジェクト（費用分類）</label>
                <select id="editProject"></select>
            </div>
            <div class="modal-actions">
                <button onclick="closeTagModal()">キャンセル</button>
                <button class="primary" id="saveTagBtn" onclick="saveTagEdit()">保存</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // --- State ---
        function localDateStr(d) { const o = d || new Date(); return `${o.getFullYear()}-${String(o.getMonth()+1).padStart(2,'0')}-${String(o.getDate()).padStart(2,'0')}`; }
        let currentDate = localDateStr();
        let tagOptions = null;
        let editingEntry = null;
        let phaseChart = null;
        let projectChart = null;

        // --- Colors ---
        const PHASE_COLORS = {
            'implementation': '#58a6ff',
            'design': '#bc8cff',
            'communication': '#f0883e',
            'review': '#3fb950',
            'documentation': '#d29922',
            'planning': '#39d2c0',
            'research': '#f778ba',
            'email': '#8b949e',
            '': '#444c56',
        };

        const CATEGORY_COLORS = {
            'development': '#58a6ff',
            'browser': '#3fb950',
            'communication': '#f0883e',
            'design': '#bc8cff',
            'documentation': '#d29922',
            'productivity': '#39d2c0',
            'media': '#f778ba',
            'other': '#8b949e',
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('datePicker').value = currentDate;
            loadDate(currentDate);
            // 30秒ごとに自動更新
            setInterval(() => {
                if (currentDate === localDateStr()) {
                    loadDate(currentDate);
                }
            }, 30000);
        });

        // --- Navigation ---
        function changeDate(delta) {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + delta);
            currentDate = localDateStr(d);
            document.getElementById('datePicker').value = currentDate;
            loadDate(currentDate);
        }

        function loadToday() {
            currentDate = localDateStr();
            document.getElementById('datePicker').value = currentDate;
            loadDate(currentDate);
        }

        // --- API Calls ---
        async function loadDate(dateStr) {
            currentDate = dateStr;
            document.getElementById('summaryLink').href = `/summary/${dateStr}`;
            try {
                const res = await fetch(`/api/daily/${dateStr}`);
                const data = await res.json();
                updateDashboard(data);
            } catch (err) {
                console.error('データ取得エラー:', err);
                document.getElementById('statusText').textContent = '接続エラー';
                document.getElementById('statusDot').style.background = '#f85149';
            }
        }

        // --- Update Dashboard ---
        function updateDashboard(data) {
            // Status
            document.getElementById('statusText').textContent = '監視中';
            document.getElementById('statusDot').style.background = '#3fb950';

            // Stats
            document.getElementById('totalTime').textContent = data.total_work_time || '0h 0m';
            document.getElementById('totalTimeSub').textContent =
                `${Math.round(data.total_seconds / 60)} 分`;

            // Unique apps
            const apps = [...new Set(data.summary.map(s => s.app_name).filter(Boolean))];
            document.getElementById('appCount').textContent = apps.length;

            // Main phase — 現在の作業（最新タイムラインから）+ 本日最多
            const phases = {};
            data.summary.forEach(s => {
                if (s.work_phase) {
                    phases[s.work_phase] = (phases[s.work_phase] || 0) + s.total_seconds;
                }
            });
            const sortedPhases = Object.entries(phases).sort((a, b) => b[1] - a[1]);

            // 最新のタイムラインエントリから現在の作業を取得
            const timeline = data.timeline || [];
            const recentActive = [...timeline].reverse().find(e => !e.is_idle);
            const currentPhase = recentActive ? recentActive.work_phase : null;

            if (currentPhase) {
                document.getElementById('mainPhase').textContent = currentPhase;
                const topPhase = sortedPhases.length > 0 ? sortedPhases[0] : null;
                document.getElementById('mainPhaseSub').textContent =
                    topPhase ? `本日最多: ${topPhase[0]} (${formatDuration(topPhase[1])})` : '';
            } else if (sortedPhases.length > 0) {
                document.getElementById('mainPhase').textContent = sortedPhases[0][0];
                document.getElementById('mainPhaseSub').textContent =
                    formatDuration(sortedPhases[0][1]);
            } else {
                document.getElementById('mainPhase').textContent = '--';
                document.getElementById('mainPhaseSub').textContent = '';
            }

            // Projects
            const projects = [...new Set(data.summary.map(s => s.project).filter(Boolean))];
            document.getElementById('projectCount').textContent = projects.length;

            // App list
            updateAppList(data.summary);

            // Phase chart
            updatePhaseChart(phases);

            // Timeline
            updateTimeline(data.timeline);

            // Heatmap
            updateHeatmap(data.hourly);

            // Calendar
            updateCalendar(data.calendar_events);

            // Project chart
            updateProjectChart(data.summary);
        }

        // --- App List ---
        function updateAppList(summary) {
            const container = document.getElementById('appList');
            const appTotals = {};
            summary.forEach(s => {
                if (s.app_name) {
                    appTotals[s.app_name] = (appTotals[s.app_name] || 0) + s.total_seconds;
                }
            });

            const sorted = Object.entries(appTotals).sort((a, b) => b[1] - a[1]);
            const maxSeconds = sorted.length > 0 ? sorted[0][1] : 1;

            if (sorted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>本日のデータはまだありません</p>
                    </div>`;
                return;
            }

            container.innerHTML = sorted.map(([app, seconds]) => `
                <div class="app-item">
                    <div style="flex: 1">
                        <div class="app-info">
                            <div class="app-icon">${getAppEmoji(app)}</div>
                            <span class="app-name">${escapeHtml(app)}</span>
                        </div>
                        <div class="app-bar" style="width: ${(seconds / maxSeconds * 100).toFixed(1)}%"></div>
                    </div>
                    <span class="app-time">${formatDuration(seconds)}</span>
                </div>
            `).join('');
        }

        // --- Phase Chart ---
        function updatePhaseChart(phases) {
            const ctx = document.getElementById('phaseChart').getContext('2d');
            const labels = Object.keys(phases);
            const values = Object.values(phases).map(v => Math.round(v / 60));
            const colors = labels.map(l => PHASE_COLORS[l] || '#444c56');

            if (phaseChart) phaseChart.destroy();

            if (labels.length === 0) {
                phaseChart = null;
                return;
            }

            phaseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#1c2333',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e6edf3',
                                font: { size: 12 },
                                padding: 12,
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    return data.labels.map((label, i) => ({
                                        text: `${label}  (${data.datasets[0].data[i]}分)`,
                                        fontColor: '#e6edf3',
                                        fillStyle: data.datasets[0].backgroundColor[i],
                                        strokeStyle: '#1c2333',
                                        lineWidth: 2,
                                        index: i,
                                    }));
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${ctx.raw}分`
                            }
                        }
                    }
                }
            });
        }

        // --- Project Chart ---
        function updateProjectChart(summary) {
            const ctx = document.getElementById('projectChart').getContext('2d');
            const projectData = {};
            summary.forEach(s => {
                const proj = s.project || '(未分類)';
                const phase = s.work_phase || '(その他)';
                if (!projectData[proj]) projectData[proj] = {};
                projectData[proj][phase] = (projectData[proj][phase] || 0) + s.total_seconds;
            });

            if (projectChart) projectChart.destroy();

            const projects = Object.keys(projectData);
            const allPhases = [...new Set(summary.map(s => s.work_phase || '(その他)'))];

            if (projects.length === 0) {
                projectChart = null;
                return;
            }

            const datasets = allPhases.map(phase => ({
                label: phase,
                data: projects.map(p => Math.round((projectData[p][phase] || 0) / 60)),
                backgroundColor: PHASE_COLORS[phase] || '#444c56',
            }));

            projectChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: projects, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#8b949e' },
                            grid: { color: '#30363d' },
                        },
                        y: {
                            stacked: true,
                            ticks: { color: '#8b949e', callback: v => v + '分' },
                            grid: { color: '#30363d' },
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#e6edf3', font: { size: 12 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${ctx.raw}分`
                            }
                        }
                    }
                }
            });
        }

        // --- Timeline ---
        function updateTimeline(timeline) {
            const container = document.getElementById('timeline');
            if (!timeline || timeline.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>本日のタイムラインデータはありません</p>
                    </div>`;
                return;
            }

            // 連続する同一アプリをグループ化
            const groups = [];
            let current = null;
            timeline.forEach(entry => {
                if (!current || current.app_name !== entry.app_name) {
                    if (current) groups.push(current);
                    current = {
                        ...entry,
                        total_duration: entry.duration_seconds || 0,
                        count: 1,
                    };
                } else {
                    current.total_duration += entry.duration_seconds || 0;
                    current.count++;
                    current.window_title = entry.window_title;
                    if (entry.tab_title) current.tab_title = entry.tab_title;
                }
            });
            if (current) groups.push(current);

            // 最新50件に絞る
            const display = groups.slice(-50).reverse();

            container.innerHTML = display.map((entry, idx) => {
                const time = new Date(entry.timestamp).toLocaleTimeString('ja-JP', {
                    hour: '2-digit', minute: '2-digit'
                });
                const dotColor = entry.is_idle ?
                    'var(--accent-red)' :
                    (PHASE_COLORS[entry.work_phase] || 'var(--accent-blue)');

                return `
                    <div class="timeline-item" onclick="openTagModal(${idx})">
                        <span class="timeline-time">${time}</span>
                        <div class="timeline-dot" style="background: ${dotColor}"></div>
                        <div class="timeline-content">
                            <div class="timeline-app">${escapeHtml(entry.app_name || '')}</div>
                            <div class="timeline-title">${escapeHtml(entry.window_title || '')}</div>
                            ${entry.tab_title ? `<div class="timeline-tab">🔖 ${escapeHtml(entry.tab_title)}</div>` : ''}
                            <div class="timeline-tags">
                                ${entry.is_idle ? '<span class="tag idle">アイドル</span>' : ''}
                                ${entry.project ? `<span class="tag project">${escapeHtml(entry.project)}</span>` : ''}
                                ${entry.work_phase ? `<span class="tag phase">${escapeHtml(entry.work_phase)}</span>` : ''}
                                ${entry.total_duration > 0 ? `<span class="tag">${formatDuration(entry.total_duration)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // タイムラインデータを保持（タグ編集用）
            window._timelineDisplay = display;
        }

        // --- Heatmap ---
        function updateHeatmap(hourly) {
            const heatmap = document.getElementById('heatmap');
            const labels = document.getElementById('heatmapLabels');

            // 時間帯ごとの合計を計算
            const hourTotals = new Array(24).fill(0);
            if (hourly) {
                hourly.forEach(h => {
                    const hour = parseInt(h.hour);
                    hourTotals[hour] += h.total_seconds || 0;
                });
            }

            const maxVal = Math.max(...hourTotals, 1);

            heatmap.innerHTML = hourTotals.map((seconds, hour) => {
                const intensity = seconds / maxVal;
                const color = intensity === 0 ?
                    'rgba(88, 166, 255, 0.05)' :
                    `rgba(88, 166, 255, ${0.15 + intensity * 0.85})`;
                const tooltip = `${hour}時: ${formatDuration(seconds)}`;
                return `<div class="heatmap-cell" style="background: ${color}"
                             data-tooltip="${tooltip}"></div>`;
            }).join('');

            labels.innerHTML = Array.from({length: 24}, (_, i) =>
                `<span>${i}</span>`
            ).join('');
        }

        // --- Calendar Events ---
        function updateCalendar(events) {
            const container = document.getElementById('calendarEvents');
            if (!events || events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📅</div>
                        <p>本日の予定はありません</p>
                    </div>`;
                return;
            }

            container.innerHTML = events.map(evt => {
                let timeLabel;
                if (evt.is_all_day) {
                    timeLabel = '終日';
                } else {
                    const start = new Date(evt.start_time).toLocaleTimeString('ja-JP', {
                        hour: '2-digit', minute: '2-digit'
                    });
                    const end = new Date(evt.end_time).toLocaleTimeString('ja-JP', {
                        hour: '2-digit', minute: '2-digit'
                    });
                    timeLabel = `${start} - ${end}`;
                }
                return `
                    <div class="event-item">
                        <span class="event-time">${timeLabel}</span>
                        <div>
                            <div class="event-title">${escapeHtml(evt.title || '')}</div>
                            ${evt.attendees ? `<div class="event-attendees">👥 ${escapeHtml(evt.attendees)}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- Utilities ---
        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '0m';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Tag Editing ---
        async function loadTagOptions() {
            if (tagOptions) return tagOptions;
            try {
                const res = await fetch('/api/tag-options');
                tagOptions = await res.json();
            } catch (err) {
                console.error('タグ選択肢取得エラー:', err);
                tagOptions = { task_categories: [], cost_categories: [] };
            }
            return tagOptions;
        }

        async function openTagModal(idx) {
            const entry = window._timelineDisplay?.[idx];
            if (!entry || entry.is_idle) return;
            editingEntry = entry;

            const opts = await loadTagOptions();

            // モーダル情報表示
            const time = new Date(entry.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('tagModalInfo').innerHTML = `
                <div>🕐 ${time}  ·  ⏱ ${formatDuration(entry.total_duration)}  ·  ${entry.count || 1} レコード</div>
                <div>📱 ${escapeHtml(entry.app_name || '')}</div>
                <div>📄 ${escapeHtml(entry.window_title || '')}</div>
            `;

            // 作業工程セレクト
            const wpSelect = document.getElementById('editWorkPhase');
            wpSelect.innerHTML = '<option value="">(変更しない)</option>' +
                opts.task_categories.map(c =>
                    `<option value="${escapeHtml(c)}" ${c === entry.work_phase ? 'selected' : ''}>${escapeHtml(c)}</option>`
                ).join('');

            // プロジェクトセレクト
            const pjSelect = document.getElementById('editProject');
            pjSelect.innerHTML = '<option value="">(変更しない)</option>' +
                '<option value="__clear__">(クリア)</option>' +
                opts.cost_categories.map(c =>
                    `<option value="${escapeHtml(c)}" ${c === entry.project ? 'selected' : ''}>${escapeHtml(c)}</option>`
                ).join('');

            document.getElementById('tagModal').classList.add('active');
        }

        function closeTagModal() {
            document.getElementById('tagModal').classList.remove('active');
            editingEntry = null;
        }

        async function saveTagEdit() {
            if (!editingEntry) return;
            const wp = document.getElementById('editWorkPhase').value;
            const pj = document.getElementById('editProject').value;

            if (!wp && !pj) {
                closeTagModal();
                return;
            }

            const btn = document.getElementById('saveTagBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            // グループの時間範囲を計算: タイムスタンプから最後のエントリまで
            const startTime = editingEntry.timestamp;
            // 最後のエントリ = タイムスタンプ + total_duration 秒後
            const endDate = new Date(new Date(startTime).getTime() + (editingEntry.total_duration || 60) * 1000);
            const endTime = endDate.toISOString().replace('Z', '');

            const body = {
                start_time: startTime,
                end_time: endTime,
                app_name: editingEntry.app_name,
            };
            if (wp) body.work_phase = wp;
            if (pj === '__clear__') body.project = '';
            else if (pj) body.project = pj;

            try {
                const res = await fetch('/api/update-tags', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const result = await res.json();
                showToast(`✅ ${result.updated} 件のレコードを更新しました`);
                closeTagModal();
                // ダッシュボードを再読み込み
                loadDate(currentDate);
            } catch (err) {
                showToast('❌ 更新に失敗しました');
                console.error('タグ更新エラー:', err);
            } finally {
                btn.disabled = false;
                btn.textContent = '保存';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // モーダル外クリックで閉じる
        document.getElementById('tagModal')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) closeTagModal();
        });

        function getAppEmoji(appName) {
            const emojis = {
                'Google Chrome': '🌐', 'Safari': '🧭', 'Firefox': '🦊',
                'Arc': '🌈', 'Microsoft Edge': '🔵',
                'Visual Studio Code': '💻', 'Code': '💻', 'Cursor': '💻',
                'Terminal': '⬛', 'iTerm2': '⬛', 'iTerm': '⬛', 'Warp': '⬛',
                'Slack': '💬', 'Discord': '💬', 'Microsoft Teams': '💬',
                'Zoom': '📹', 'FaceTime': '📹',
                'Figma': '🎨', 'Sketch': '🎨',
                'Notion': '📝', 'Obsidian': '📝',
                'Finder': '📂', 'Preview': '🖼',
                'Mail': '✉️', 'Spotify': '🎵', 'Music': '🎵',
                'Calendar': '📅', 'Reminders': '✅',
                'Xcode': '🔨', 'IntelliJ IDEA': '🔨',
            };
            return emojis[appName] || '📱';
        }

        // --- アップデートチェック ---
        let _updateDownloadUrl = '';

        async function checkForUpdates() {
            try {
                const res = await fetch('/api/check-update');
                if (!res.ok) return;
                const data = await res.json();
                if (data.is_update_available) {
                    _updateDownloadUrl = data.download_url || '';
                    document.getElementById('updateVersion').textContent = 'v' + data.latest_version;
                    document.getElementById('updateReleaseLink').href = data.release_url || '#';
                    const notesEl = document.getElementById('updateNotes');
                    if (data.release_notes) {
                        const firstLine = data.release_notes.split('\n')[0].substring(0, 80);
                        notesEl.textContent = '— ' + firstLine;
                    }
                    document.getElementById('updateBanner').classList.add('visible');
                }
            } catch (e) {
                // ネットワークエラーは無視（オフライン時など）
            }
        }

        function dismissUpdate() {
            document.getElementById('updateBanner').classList.remove('visible');
            sessionStorage.setItem('updateDismissed', '1');
        }

        async function performUpdate() {
            const btn = event.target;
            btn.textContent = '更新中...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ download_url: _updateDownloadUrl }),
                });
                const data = await res.json();
                if (data.success) {
                    const restartMsg = data.restart
                        ? ' — アプリを自動的に再起動します...'
                        : ' — アプリを再起動してください';
                    document.getElementById('updateBanner').innerHTML =
                        '<span class="update-icon">✅</span>' +
                        '<div class="update-text"><strong>' + data.message + '</strong>' +
                        restartMsg + '</div>' +
                        '<button class="update-btn-close" onclick="dismissUpdate()">&times;</button>';
                } else {
                    btn.textContent = '失敗';
                    btn.style.background = 'var(--accent-red)';
                    alert('アップデート失敗: ' + data.message + '\n\n' + (data.details || ''));
                    setTimeout(() => { btn.textContent = 'アップデート'; btn.disabled = false; btn.style.background = ''; }, 3000);
                }
            } catch (e) {
                btn.textContent = 'エラー';
                alert('アップデートに失敗しました: ' + e.message);
                setTimeout(() => { btn.textContent = 'アップデート'; btn.disabled = false; }, 3000);
            }
        }

        // バージョン表示
        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('versionBadge').textContent = 'v' + d.version;
        }).catch(() => {});

        // ページ読み込み後にアップデートチェック（セッション中一度だけ）
        if (!sessionStorage.getItem('updateDismissed')) {
            setTimeout(checkForUpdates, 3000);  // 3秒後に非同期チェック
        }
    </script>
</body>
</html>
