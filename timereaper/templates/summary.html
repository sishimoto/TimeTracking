<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeReaper - 日次サマリー</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-orange: #f0883e;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-cyan: #39d2c0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 .app-icon {
            width: 28px;
            height: 28px;
            vertical-align: middle;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .nav-links a:hover {
            background: var(--bg-card);
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-nav button {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .date-nav button:hover {
            background: var(--bg-card);
        }

        .date-nav input[type="date"] {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 22px;
            font-weight: 700;
            margin: 2px 0;
        }

        .stat-card.blue .value { color: var(--accent-blue); }
        .stat-card.green .value { color: var(--accent-green); }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .toolbar label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toolbar select, .toolbar input[type="text"] {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .toolbar button {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .toolbar button:hover { opacity: 0.85; }

        .toolbar button.secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .toolbar select.filter-active {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 1px var(--accent-blue);
        }

        .filter-badge {
            font-size: 11px;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }

        .filter-badge.active { display: inline; }

        /* Maintenance decision banner */
        .maintenance-banner {
            display: none;
            margin-bottom: 14px;
            background: rgba(240, 136, 62, 0.12);
            border: 1px solid rgba(240, 136, 62, 0.45);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .maintenance-banner.visible {
            display: block;
        }

        .maintenance-banner .title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 6px;
        }

        .maintenance-banner .desc {
            font-size: 12px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .maintenance-banner .meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            word-break: break-all;
        }

        .maintenance-banner .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .maintenance-banner button {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .maintenance-banner button.maintenance {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
            background: rgba(240, 136, 62, 0.14);
        }

        .maintenance-banner button.dev {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.14);
        }

        .maintenance-banner button.later {
            color: var(--text-secondary);
        }

        /* Block Table */
        .block-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .block-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .block-table th {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .block-table td {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 10px;
            vertical-align: middle;
        }

        .block-table tr:hover td {
            background: var(--bg-secondary);
        }

        .block-table tr.selected td {
            background: rgba(88, 166, 255, 0.12);
            border-color: var(--accent-blue);
        }

        .block-table tr.drag-over td {
            background: rgba(88, 166, 255, 0.08);
        }

        .block-table.dragging {
            user-select: none;
            -webkit-user-select: none;
        }

        .block-time {
            font-weight: 600;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .block-apps {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .block-app-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            white-space: nowrap;
        }

        .block-app-chip .app-sec {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .block-duration {
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .block-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .block-tag.phase {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }

        .block-tag.project {
            background: rgba(188, 140, 255, 0.15);
            color: var(--accent-purple);
        }

        .block-tag.empty {
            background: rgba(139, 148, 158, 0.1);
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Block titles (tab/window info) */
        .block-titles {
            margin-top: 4px;
            padding-left: 2px;
        }

        .block-title-line {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
            line-height: 1.4;
        }

        .block-title-line::before {
            content: "📄 ";
            font-size: 10px;
        }

        /* Checkbox column */
        .block-table .cb-col {
            width: 30px;
            text-align: center;
        }

        .block-table input[type="checkbox"] {
            accent-color: var(--accent-blue);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        /* Bulk edit bar */
        .bulk-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 12px 24px;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
        }

        .bulk-bar.active { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .bulk-bar .bulk-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-blue);
            min-width: 100px;
        }

        .bulk-bar select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .bulk-bar label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .bulk-bar button {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .bulk-bar button.primary {
            background: var(--accent-blue);
            color: #fff;
        }

        .bulk-bar button.cancel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .bulk-bar button:hover { opacity: 0.85; }
        .bulk-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Tag management section */
        .tag-mgmt {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .tag-mgmt h2 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-mgmt-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .tag-mgmt-col {
            flex: 1;
            min-width: 300px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .tag-mgmt-col h3 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag-item {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        .add-tag-row {
            display: flex;
            gap: 6px;
        }

        .add-tag-row input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .add-tag-row button {
            background: var(--accent-green);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .add-tag-row button:hover { opacity: 0.85; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            right: 24px;
            background: var(--accent-green);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show { opacity: 1; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

        /* Hourly heatmap */
        .heatmap-section {
            margin-bottom: 20px;
        }

        .heatmap-section h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .heatmap {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            min-height: 24px;
        }

        .heatmap-cell:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
        }

        .heatmap-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 4px;
        }

        .heatmap-labels span {
            text-align: center;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Table wrapper for bottom padding when bulk-bar is visible */
        .table-wrap { padding-bottom: 80px; }

        /* Responsive */
        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .tag-mgmt-col { min-width: 0; }
            .block-title-line { max-width: 250px; }
        }

        @media (max-width: 600px) {
            .container { padding: 12px; }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            header h1 { font-size: 20px; }
            header h1 .app-icon { width: 22px; height: 22px; }

            .nav-links { width: 100%; }
            .nav-links a { flex: 1; text-align: center; font-size: 12px; padding: 5px 6px; }

            .date-nav {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
            }
            .date-nav button, .date-nav input[type="date"] {
                font-size: 12px;
                padding: 4px 8px;
            }

            .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-card { padding: 10px 12px; }
            .stat-card .value { font-size: 18px; }

            .toolbar { gap: 8px; }
            .toolbar select, .toolbar input[type="text"], .toolbar button {
                font-size: 12px;
                padding: 5px 8px;
            }

            /* Block table: horizontal scroll on narrow screens */
            .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .block-table { min-width: 600px; }
            .block-title-line { max-width: 180px; }

            .tag-mgmt-row { flex-direction: column; }
            .tag-mgmt-col { min-width: 0; }

            .bulk-bar { padding: 10px 12px; gap: 8px; }
            .bulk-bar .bulk-count { min-width: auto; font-size: 12px; }
            .bulk-bar select, .bulk-bar button { font-size: 12px; padding: 6px 10px; }

            .toast { bottom: 80px; right: 12px; font-size: 12px; }
        }

        /* Download dropdown */
        .download-dropdown {
            position: relative;
            display: inline-block;
        }
        .download-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: var(--bg-card);
        }
        .download-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 200px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .download-menu.show {
            display: block;
        }
        .download-menu a {
            display: block;
            padding: 8px 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 13px;
            transition: background 0.15s;
        }
        .download-menu a:hover {
            background: var(--bg-secondary);
        }
        .download-menu .menu-label {
            padding: 4px 16px 2px;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .download-menu .menu-divider {
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }
        .version-badge {
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .version-badge:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .version-badge.checking { opacity: 0.5; pointer-events: none; }
        .update-toast {
            display: none; align-items: center; gap: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 14px; margin-bottom: 12px;
            font-size: 13px; animation: slideDown 0.3s ease;
        }
        .update-toast.visible { display: flex; }
        .update-toast .update-text { flex: 1; color: var(--text-secondary); }
        .update-toast .update-text strong { color: var(--accent-green); }
        .update-toast .update-btn {
            padding: 4px 12px; border-radius: 5px; border: none;
            cursor: pointer; font-size: 12px; transition: opacity 0.2s;
        }
        .update-toast .update-btn:hover { opacity: 0.85; }
        .update-btn-primary { background: var(--accent-green); color: #0d1117; font-weight: 600; }
        .update-btn-secondary {
            background: transparent; border: 1px solid var(--border) !important;
            color: var(--text-secondary); font-size: 12px; text-decoration: none;
        }
        .update-btn-close {
            background: transparent; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1;
        }
        .update-toast.latest { border-color: var(--accent-blue); }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><img src="/static/icon-128.png" alt="" class="app-icon">日次サマリー <span id="versionBadge" class="version-badge" onclick="manualCheckForUpdates()" title="クリックでアップデートを確認" style="font-size: 11px; font-weight: 400; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); padding: 2px 8px; border-radius: 10px; vertical-align: middle; margin-left: 6px;"></span></h1>
                <div class="nav-links">
                    <a href="/">← ダッシュボード</a>
                    <a href="/weekly">📊 週次</a>
                    <a href="/settings">⚙ 設定</a>
                    <div class="download-dropdown">
                        <button class="download-btn" onclick="toggleDownloadMenu(event)">📥 エクスポート</button>
                        <div class="download-menu" id="downloadMenu">
                            <div class="menu-label">📄 日次サマリー</div>
                            <a href="#" onclick="downloadDaily('md'); return false;">📝 Markdown (.md)</a>
                            <a href="#" onclick="downloadDaily('pdf'); return false;">📊 PDF</a>
                            <div class="menu-divider"></div>
                            <div class="menu-label">📅 月次サマリー</div>
                            <a href="#" onclick="downloadMonthly('md'); return false;">📝 Markdown (.md)</a>
                            <a href="#" onclick="downloadMonthly('pdf'); return false;">📊 PDF</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="date-nav">
                <button onclick="changeDate(-1)">← 前日</button>
                <input type="date" id="datePicker" onchange="goToDate(this.value)">
                <button onclick="changeDate(1)">翌日 →</button>
                <button onclick="goToday()">今日</button>
            </div>
        </header>

        <!-- Update Toast -->
        <div class="update-toast" id="updateToast"></div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card blue">
                <div class="label">合計作業時間</div>
                <div class="value" id="totalTime">--</div>
            </div>
            <div class="stat-card green">
                <div class="label">ブロック数</div>
                <div class="value" id="blockCount">--</div>
            </div>
        </div>

        <!-- Hourly Heatmap -->
        <div class="heatmap-section">
            <h2>📊 時間帯別アクティビティ</h2>
            <div class="heatmap" id="heatmap"></div>
            <div class="heatmap-labels" id="heatmapLabels"></div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <label>フィルタ: </label>
            <select id="filterPhase" onchange="applyFilters()">
                <option value="">全作業工程</option>
            </select>
            <select id="filterProject" onchange="applyFilters()">
                <option value="">全プロジェクト</option>
            </select>
            <select id="filterApp" onchange="applyFilters()">
                <option value="">全アプリ</option>
            </select>
            <span class="filter-badge" id="filterBadge"></span>
            <button class="secondary" onclick="clearFilters()">クリア</button>
            <span style="flex:1"></span>
            <label>選択: </label>
            <button class="secondary" onclick="selectAll()">全選択</button>
            <button class="secondary" onclick="deselectAll()">全解除</button>
            <button class="secondary" onclick="selectUntagged()">未タグのみ</button>
            <span style="flex:1"></span>
            <button class="secondary" id="llmBtn" onclick="runLlmClassify()" style="display:none;" title="LLM でアクティビティを自動分類">🤖 AI分類</button>
        </div>

        <div class="maintenance-banner" id="maintenanceBanner">
            <div class="title">🛠 保守候補を検出しました</div>
            <div class="desc" id="maintenanceBannerDesc"></div>
            <div class="meta" id="maintenanceBannerMeta"></div>
            <div class="actions">
                <button class="maintenance" onclick="decideMaintenancePrompt('maintenance')">保守中として反映</button>
                <button class="dev" onclick="decideMaintenancePrompt('development')">開発中</button>
                <button class="later" onclick="decideMaintenancePrompt('later')">後で</button>
            </div>
        </div>

        <!-- Block Table -->
        <div class="table-wrap">
            <table class="block-table">
                <thead>
                    <tr>
                        <th class="cb-col"><input type="checkbox" id="checkAll" onchange="toggleAll(this.checked)"></th>
                        <th>時間帯</th>
                        <th>アプリ</th>
                        <th>作業時間</th>
                        <th>作業工程</th>
                        <th>プロジェクト</th>
                    </tr>
                </thead>
                <tbody id="blockBody">
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <p>読み込み中...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Tag Management -->
        <div class="tag-mgmt">
            <h2>⚙️ タグ管理</h2>
            <div class="tag-mgmt-row">
                <div class="tag-mgmt-col">
                    <h3>作業工程（タスク分類）</h3>
                    <div class="tag-list" id="taskTagList"></div>
                    <div class="add-tag-row">
                        <input type="text" id="newTaskTag" placeholder="新しい作業工程を追加...">
                        <button onclick="addTag('task_categories')">＋ 追加</button>
                    </div>
                </div>
                <div class="tag-mgmt-col">
                    <h3>プロジェクト（費用分類）</h3>
                    <div class="tag-list" id="costTagList"></div>
                    <div class="add-tag-row">
                        <input type="text" id="newCostTag" placeholder="新しいプロジェクトを追加...">
                        <button onclick="addTag('cost_categories')">＋ 追加</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bulk Edit Bar -->
    <div class="bulk-bar" id="bulkBar">
        <span class="bulk-count" id="bulkCount">0 件選択中</span>
        <label>作業工程:</label>
        <select id="bulkWorkPhase">
            <option value="">(変更しない)</option>
        </select>
        <label>プロジェクト:</label>
        <select id="bulkProject">
            <option value="">(変更しない)</option>
        </select>
        <button class="primary" id="bulkSaveBtn" onclick="bulkSave()">一括保存</button>
        <button class="cancel" onclick="deselectAll()">キャンセル</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // --- State ---
        let currentDate = '{{ target_date }}';
        let blocks = [];
        let filteredIndices = null; // null = no filter, array = visible indices
        let selected = new Set();
        let lastSelectedIdx = null;
        let tagOptions = null;
        let maintenancePrompt = null;
        let maintenancePromptTimer = null;

        // Drag selection state
        let isDragging = false;
        let dragStartIdx = null;
        let dragCurrentIdx = null;
        let dragMode = null; // 'select' or 'deselect'
        let dragMoved = false; // ドラッグ中に実際に移動したか

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('datePicker').value = currentDate;
            loadBlocks();
            loadTagOptions();
            initDragSelection();
            pollMaintenancePrompt();
            maintenancePromptTimer = setInterval(pollMaintenancePrompt, 15000);
        });

        // --- Navigation ---
        function changeDate(delta) {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + delta);
            const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            goToDate(ds);
        }

        function goToday() {
            const now = new Date();
            goToDate(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`);
        }

        function goToDate(dateStr) {
            window.location.href = `/summary/${dateStr}`;
        }

        // --- Download ---
        function toggleDownloadMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('downloadMenu');
            menu.classList.toggle('show');
        }

        document.addEventListener('click', () => {
            const menu = document.getElementById('downloadMenu');
            if (menu) menu.classList.remove('show');
        });

        function downloadDaily(format) {
            document.getElementById('downloadMenu').classList.remove('show');
            window.location.href = `/api/export/daily/${currentDate}?format=${format}`;
        }

        function downloadMonthly(format) {
            document.getElementById('downloadMenu').classList.remove('show');
            const d = new Date(currentDate);
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            window.location.href = `/api/export/monthly/${year}/${month}?format=${format}`;
        }

        // --- API ---
        async function loadBlocks() {
            try {
                const [blocksRes, hourlyRes] = await Promise.all([
                    fetch(`/api/time-blocks/${currentDate}`),
                    fetch(`/api/hourly/${currentDate}`)
                ]);
                const data = await blocksRes.json();
                blocks = data.blocks || [];
                populateFilterSelects();
                renderBlocks();
                updateStats();

                const hourlyData = await hourlyRes.json();
                updateHeatmap(hourlyData.hourly);
            } catch (err) {
                console.error('ブロック取得エラー:', err);
            }
        }

        async function loadTagOptions() {
            try {
                const res = await fetch('/api/tag-options');
                tagOptions = await res.json();
                populateSelects();
                renderTagLists();
            } catch (err) {
                console.error('タグ選択肢取得エラー:', err);
                tagOptions = { task_categories: [], cost_categories: [] };
            }
        }

        async function pollMaintenancePrompt() {
            try {
                const res = await fetch('/api/maintenance-prompt/current');
                if (!res.ok) return;
                const data = await res.json();
                const prompt = data.prompt || null;
                if (!prompt) {
                    maintenancePrompt = null;
                    renderMaintenancePrompt();
                    return;
                }
                if (maintenancePrompt && maintenancePrompt.id === prompt.id) return;
                maintenancePrompt = prompt;
                renderMaintenancePrompt();
            } catch (e) {
                // 通信エラー時は静かに継続
            }
        }

        function renderMaintenancePrompt() {
            const el = document.getElementById('maintenanceBanner');
            if (!el) return;
            if (!maintenancePrompt) {
                el.classList.remove('visible');
                return;
            }
            const s = maintenancePrompt.snapshot || {};
            const score = maintenancePrompt.score || 0;
            const reasons = (maintenancePrompt.reasons || []).join(' / ');
            const title = s.tab_title || s.window_title || '(タイトルなし)';
            document.getElementById('maintenanceBannerDesc').textContent =
                `${s.app_name || 'Unknown'}: ${title.slice(0, 120)}`;
            document.getElementById('maintenanceBannerMeta').textContent =
                `score=${score} | reasons=${reasons || '-'} | suggested=${maintenancePrompt.suggested_project || ''}`;
            el.classList.add('visible');
        }

        async function decideMaintenancePrompt(decision) {
            if (!maintenancePrompt) return;
            const body = {
                prompt_id: maintenancePrompt.id,
                decision,
                project: maintenancePrompt.suggested_project || 'Impulse保守開発・保守作業',
            };
            if (decision === 'maintenance') {
                const lookback = maintenancePrompt.lookback_minutes || 15;
                const now = new Date();
                const start = new Date(now.getTime() - lookback * 60 * 1000);
                body.start_time = start.toISOString().replace('Z', '');
                body.end_time = now.toISOString().replace('Z', '');
            }

            try {
                const res = await fetch('/api/maintenance-prompt/decide', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    showToast('⚠️ 保守判定の反映に失敗しました');
                    return;
                }
                maintenancePrompt = null;
                renderMaintenancePrompt();
                if (decision === 'maintenance') {
                    showToast(`✅ 保守に反映しました (${data.updated || 0}件)`);
                    loadBlocks();
                } else if (decision === 'development') {
                    showToast('✅ 開発中として記録を継続します');
                } else {
                    showToast('⏸ 後で再確認します');
                }
            } catch (e) {
                showToast('⚠️ 保守判定の通信に失敗しました');
            }
        }

        // --- Render ---
        function renderBlocks() {
            const tbody = document.getElementById('blockBody');
            if (blocks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>この日のデータはありません</p>
                    </div>
                </td></tr>`;
                return;
            }

            const visibleIndices = filteredIndices !== null ? filteredIndices : blocks.map((_, i) => i);

            if (visibleIndices.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6">
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>フィルタ条件に一致するブロックがありません</p>
                    </div>
                </td></tr>`;
                return;
            }

            tbody.innerHTML = visibleIndices.map(idx => {
                const b = blocks[idx];
                const isSelected = selected.has(idx);
                const topApps = (b.top_apps || []).map(a =>
                    `<span class="block-app-chip">${escapeHtml(a.app)} <span class="app-sec">${formatDuration(a.seconds)}</span></span>`
                ).join('');
                const titles = (b.titles || []).map(t =>
                    `<div class="block-title-line">${escapeHtml(t)}</div>`
                ).join('');

                const wpTag = b.work_phase
                    ? `<span class="block-tag phase">${escapeHtml(b.work_phase)}</span>`
                    : `<span class="block-tag empty">—</span>`;
                const pjTag = b.project
                    ? `<span class="block-tag project">${escapeHtml(b.project)}</span>`
                    : `<span class="block-tag empty">—</span>`;

                return `<tr class="${isSelected ? 'selected' : ''}" data-idx="${idx}" onclick="onRowClick(event, ${idx})">
                    <td class="cb-col">
                        <input type="checkbox" ${isSelected ? 'checked' : ''}
                               onclick="onCheckboxClick(event, ${idx})">
                    </td>
                    <td class="block-time">${b.block_label}</td>
                    <td><div class="block-apps">${topApps}</div>${titles ? `<div class="block-titles">${titles}</div>` : ''}</td>
                    <td class="block-duration">${formatDuration(b.total_seconds)}</td>
                    <td>${wpTag}</td>
                    <td>${pjTag}</td>
                </tr>`;
            }).join('');
        }

        function updateStats() {
            const visibleIndices = filteredIndices !== null ? filteredIndices : blocks.map((_, i) => i);
            const totalSec = visibleIndices.reduce((s, idx) => s + (blocks[idx].total_seconds || 0), 0);
            document.getElementById('totalTime').textContent = formatDuration(totalSec);
            const suffix = filteredIndices !== null ? ` / ${blocks.length}` : '';
            document.getElementById('blockCount').textContent = visibleIndices.length + suffix;
        }

        function populateSelects() {
            if (!tagOptions) return;
            const wpSel = document.getElementById('bulkWorkPhase');
            const pjSel = document.getElementById('bulkProject');

            wpSel.innerHTML = '<option value="">(変更しない)</option>' +
                '<option value="__clear__">(クリア)</option>' +
                tagOptions.task_categories.map(c =>
                    `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`
                ).join('');

            pjSel.innerHTML = '<option value="">(変更しない)</option>' +
                '<option value="__clear__">(クリア)</option>' +
                tagOptions.cost_categories.map(c =>
                    `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`
                ).join('');

            // フィルタセレクトを自動的にデータから生成
            populateFilterSelects();
        }

        function populateFilterSelects() {
            const phases = new Set();
            const projects = new Set();
            const apps = new Set();
            let hasUntaggedPhase = false;
            let hasUntaggedProject = false;
            blocks.forEach(b => {
                if (b.work_phase) phases.add(b.work_phase);
                else hasUntaggedPhase = true;
                if (b.project) projects.add(b.project);
                else hasUntaggedProject = true;
                (b.top_apps || []).forEach(a => { if (a.app) apps.add(a.app); });
            });

            const fPhase = document.getElementById('filterPhase');
            const fProject = document.getElementById('filterProject');
            const fApp = document.getElementById('filterApp');

            const curPhase = fPhase.value;
            const curProject = fProject.value;
            const curApp = fApp.value;

            fPhase.innerHTML = '<option value="">全作業工程</option>' +
                (hasUntaggedPhase ? '<option value="__untagged__">🏷️ 未設定</option>' : '') +
                [...phases].sort().map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
            fProject.innerHTML = '<option value="">全プロジェクト</option>' +
                (hasUntaggedProject ? '<option value="__untagged__">🏷️ 未設定</option>' : '') +
                [...projects].sort().map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
            fApp.innerHTML = '<option value="">全アプリ</option>' +
                [...apps].sort().map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

            // 以前の選択を復元
            fPhase.value = curPhase;
            fProject.value = curProject;
            fApp.value = curApp;
        }

        function applyFilters() {
            const fPhase = document.getElementById('filterPhase').value;
            const fProject = document.getElementById('filterProject').value;
            const fApp = document.getElementById('filterApp').value;

            if (!fPhase && !fProject && !fApp) {
                filteredIndices = null;
            } else {
                filteredIndices = [];
                blocks.forEach((b, idx) => {
                    let match = true;
                    if (fPhase === '__untagged__') {
                        if (b.work_phase) match = false;
                    } else if (fPhase && b.work_phase !== fPhase) {
                        match = false;
                    }
                    if (fProject === '__untagged__') {
                        if (b.project) match = false;
                    } else if (fProject && b.project !== fProject) {
                        match = false;
                    }
                    if (fApp) {
                        const hasApp = (b.top_apps || []).some(a => a.app === fApp);
                        if (!hasApp) match = false;
                    }
                    if (match) filteredIndices.push(idx);
                });
            }

            // フィルタ状態の視覚フィードバック
            updateFilterVisuals(fPhase, fProject, fApp);

            // フィルタ変更時に選択をクリア（非表示ブロックの選択残りを防ぐ）
            selected.clear();
            updateBulkBar();
            renderBlocks();
            updateStats();
        }

        function updateFilterVisuals(fPhase, fProject, fApp) {
            const phaseEl = document.getElementById('filterPhase');
            const projectEl = document.getElementById('filterProject');
            const appEl = document.getElementById('filterApp');
            const badge = document.getElementById('filterBadge');

            phaseEl.classList.toggle('filter-active', !!fPhase);
            projectEl.classList.toggle('filter-active', !!fProject);
            appEl.classList.toggle('filter-active', !!fApp);

            const activeCount = [fPhase, fProject, fApp].filter(Boolean).length;
            if (activeCount > 0 && filteredIndices !== null) {
                badge.textContent = `${filteredIndices.length} / ${blocks.length} 件`;
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }
        }

        function clearFilters() {
            document.getElementById('filterPhase').value = '';
            document.getElementById('filterProject').value = '';
            document.getElementById('filterApp').value = '';
            filteredIndices = null;
            updateFilterVisuals('', '', '');
            renderBlocks();
            updateStats();
        }

        function renderTagLists() {
            if (!tagOptions) return;
            document.getElementById('taskTagList').innerHTML =
                tagOptions.task_categories.map(c =>
                    `<span class="tag-item">${escapeHtml(c)}</span>`
                ).join('');
            document.getElementById('costTagList').innerHTML =
                tagOptions.cost_categories.map(c =>
                    `<span class="tag-item">${escapeHtml(c)}</span>`
                ).join('');
        }

        // --- Selection ---
        function onRowClick(event, idx) {
            // ドラッグ後のクリックは無視
            if (dragMoved) {
                dragMoved = false;
                return;
            }
            // 行クリックでトグル（Shift対応）
            const willSelect = !selected.has(idx);
            handleSelect(idx, willSelect, event.shiftKey);
        }

        function onCheckboxClick(event, idx) {
            event.stopPropagation();
            const willSelect = event.target.checked;
            handleSelect(idx, willSelect, event.shiftKey);
        }

        function handleSelect(idx, checked, isShift) {
            const visible = getVisibleIndices();
            if (isShift && lastSelectedIdx !== null) {
                // Shift+クリック: 表示中のブロック内で範囲選択/解除
                const visiblePos = (i) => visible.indexOf(i);
                const fromPos = visiblePos(lastSelectedIdx);
                const toPos = visiblePos(idx);
                if (fromPos !== -1 && toPos !== -1) {
                    const startPos = Math.min(fromPos, toPos);
                    const endPos = Math.max(fromPos, toPos);
                    for (let p = startPos; p <= endPos; p++) {
                        if (checked) selected.add(visible[p]);
                        else selected.delete(visible[p]);
                    }
                } else {
                    // fallback: lastSelectedIdx が非表示の場合は単一選択
                    if (checked) selected.add(idx);
                    else selected.delete(idx);
                }
            } else {
                if (checked) selected.add(idx);
                else selected.delete(idx);
            }
            lastSelectedIdx = idx;
            updateBulkBar();
            renderBlocks();
        }

        function toggleSelect(idx, checked) {
            handleSelect(idx, checked, false);
        }

        function getVisibleIndices() {
            return filteredIndices !== null ? filteredIndices : blocks.map((_, i) => i);
        }

        function toggleAll(checked) {
            const visible = getVisibleIndices();
            if (checked) {
                visible.forEach(i => selected.add(i));
            } else {
                visible.forEach(i => selected.delete(i));
            }
            updateBulkBar();
            renderBlocks();
        }

        function selectAll() {
            document.getElementById('checkAll').checked = true;
            toggleAll(true);
        }

        function deselectAll() {
            document.getElementById('checkAll').checked = false;
            selected.clear();
            updateBulkBar();
            renderBlocks();
        }

        function selectUntagged() {
            selected.clear();
            const visible = getVisibleIndices();
            visible.forEach(i => {
                const b = blocks[i];
                if (!b.work_phase || !b.project) selected.add(i);
            });
            updateBulkBar();
            renderBlocks();
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulkBar');
            if (selected.size > 0) {
                bar.classList.add('active');
                document.getElementById('bulkCount').textContent = `${selected.size} 件選択中`;
            } else {
                bar.classList.remove('active');
            }
        }

        // --- Bulk Save ---
        async function bulkSave() {
            const wp = document.getElementById('bulkWorkPhase').value;
            const pj = document.getElementById('bulkProject').value;

            if (!wp && !pj) {
                showToast('⚠️ 変更する項目を選択してください');
                return;
            }

            const btn = document.getElementById('bulkSaveBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            let totalUpdated = 0;
            const promises = [...selected].map(async (idx) => {
                const b = blocks[idx];
                const body = {
                    start_time: b.block_start,
                    end_time: b.block_end,
                };
                if (wp === '__clear__') body.work_phase = '';
                else if (wp) body.work_phase = wp;
                if (pj === '__clear__') body.project = '';
                else if (pj) body.project = pj;

                try {
                    const res = await fetch('/api/update-block-tags', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });
                    const result = await res.json();
                    totalUpdated += result.updated || 0;
                } catch (err) {
                    console.error('ブロック更新エラー:', err);
                }
            });

            await Promise.all(promises);

            showToast(`✅ ${totalUpdated} 件のレコードを更新しました`);
            btn.disabled = false;
            btn.textContent = '一括保存';
            selected.clear();
            updateBulkBar();
            loadBlocks();
        }

        // --- Tag Management ---
        async function addTag(category) {
            const inputId = category === 'task_categories' ? 'newTaskTag' : 'newCostTag';
            const input = document.getElementById(inputId);
            const value = input.value.trim();
            if (!value) return;

            try {
                const res = await fetch('/api/add-tag', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, value }),
                });
                const result = await res.json();
                if (result.ok) {
                    showToast(`✅ "${value}" を追加しました`);
                    input.value = '';
                    // リロード
                    tagOptions = null;
                    await loadTagOptions();
                } else {
                    showToast(`⚠️ ${result.message}`);
                }
            } catch (err) {
                showToast('❌ 追加に失敗しました');
                console.error('タグ追加エラー:', err);
            }
        }

        // Add tag on Enter key
        document.getElementById('newTaskTag')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTag('task_categories');
        });
        document.getElementById('newCostTag')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTag('cost_categories');
        });

        // --- Utilities ---
        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '0m';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Heatmap ---
        function updateHeatmap(hourly) {
            const heatmap = document.getElementById('heatmap');
            const labels = document.getElementById('heatmapLabels');

            const hourTotals = new Array(24).fill(0);
            if (hourly) {
                hourly.forEach(h => {
                    const hour = parseInt(h.hour);
                    hourTotals[hour] += h.total_seconds || 0;
                });
            }

            const maxVal = Math.max(...hourTotals, 1);

            heatmap.innerHTML = hourTotals.map((seconds, hour) => {
                const intensity = seconds / maxVal;
                const color = intensity === 0 ?
                    'rgba(88, 166, 255, 0.05)' :
                    `rgba(88, 166, 255, ${0.15 + intensity * 0.85})`;
                const tooltip = `${hour}時: ${formatDuration(seconds)}`;
                return `<div class="heatmap-cell" style="background: ${color}"
                             data-tooltip="${tooltip}"></div>`;
            }).join('');

            labels.innerHTML = Array.from({length: 24}, (_, i) =>
                `<span>${i}</span>`
            ).join('');
        }

        // --- Drag Selection ---
        function initDragSelection() {
            const tbody = document.getElementById('blockBody');
            const table = document.querySelector('.block-table');

            tbody.addEventListener('mousedown', (e) => {
                // チェックボックスやリンクのクリックは無視
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'A') return;
                // 左クリックのみ
                if (e.button !== 0) return;

                const row = e.target.closest('tr[data-idx]');
                if (!row) return;

                const idx = parseInt(row.dataset.idx);
                isDragging = true;
                dragStartIdx = idx;
                dragCurrentIdx = idx;
                dragMoved = false;
                // 開始行が既に選択されていたら解除モード、そうでなければ選択モード
                dragMode = selected.has(idx) ? 'deselect' : 'select';

                table.classList.add('dragging');
                e.preventDefault(); // テキスト選択を防止
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const row = e.target.closest('tr[data-idx]');
                if (!row) return;

                const idx = parseInt(row.dataset.idx);
                if (idx === dragCurrentIdx) return;
                dragCurrentIdx = idx;
                dragMoved = true;

                // ドラッグ範囲のプレビュー表示
                updateDragPreview();
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;

                const table = document.querySelector('.block-table');
                table.classList.remove('dragging');

                // 実際にドラッグした場合のみ範囲選択を適用
                if (dragMoved) {
                    applyDragSelection();
                }

                dragStartIdx = null;
                dragCurrentIdx = null;
                dragMode = null;
            });
        }

        function updateDragPreview() {
            if (dragStartIdx === null || dragCurrentIdx === null) return;
            const visible = getVisibleIndices();
            const startPos = visible.indexOf(dragStartIdx);
            const endPos = visible.indexOf(dragCurrentIdx);
            if (startPos === -1 || endPos === -1) return;

            const from = Math.min(startPos, endPos);
            const to = Math.max(startPos, endPos);
            const dragRange = new Set(visible.slice(from, to + 1));

            // drag-over クラスを更新
            document.querySelectorAll('.block-table tr[data-idx]').forEach(row => {
                const idx = parseInt(row.dataset.idx);
                row.classList.toggle('drag-over', dragRange.has(idx) && !selected.has(idx));
            });
        }

        function applyDragSelection() {
            if (dragStartIdx === null || dragCurrentIdx === null) return;
            const visible = getVisibleIndices();
            const startPos = visible.indexOf(dragStartIdx);
            const endPos = visible.indexOf(dragCurrentIdx);
            if (startPos === -1 || endPos === -1) return;

            const from = Math.min(startPos, endPos);
            const to = Math.max(startPos, endPos);

            for (let p = from; p <= to; p++) {
                const idx = visible[p];
                if (dragMode === 'select') selected.add(idx);
                else selected.delete(idx);
            }

            // drag-over クラスをクリア
            document.querySelectorAll('.block-table tr.drag-over').forEach(row => {
                row.classList.remove('drag-over');
            });

            updateBulkBar();
            renderBlocks();
        }

        // --- LLM 分類 ---
        async function checkLlmStatus() {
            try {
                const res = await fetch('/api/llm-status');
                const data = await res.json();
                if (data.enabled && data.has_api_key) {
                    document.getElementById('llmBtn').style.display = '';
                }
            } catch(e) {}
        }
        checkLlmStatus();

        async function runLlmClassify() {
            const btn = document.getElementById('llmBtn');
            btn.textContent = '🤖 分類中...';
            btn.disabled = true;
            try {
                // まずプレビュー
                const res = await fetch('/api/llm-classify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({date: currentDate, dry_run: false, min_confidence: 0.5}),
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`AI分類: ${data.applied}件適用、${data.skipped}件スキップ`);
                    loadBlocks();  // データ再読み込み
                } else {
                    showToast('AI分類エラー: ' + data.message);
                }
            } catch(e) {
                showToast('AI分類に失敗しました');
            }
            btn.textContent = '🤖 AI分類';
            btn.disabled = false;
        }

        // --- アップデートチェック ---
        let _updateDownloadUrl = '';
        let _currentVersion = '';

        function showUpdateToast(html, cls) {
            const el = document.getElementById('updateToast');
            el.innerHTML = html;
            el.className = 'update-toast visible' + (cls ? ' ' + cls : '');
        }

        function dismissUpdate() {
            const el = document.getElementById('updateToast');
            el.classList.remove('visible');
            sessionStorage.setItem('updateDismissed', '1');
        }

        async function checkForUpdates(manual) {
            const badge = document.getElementById('versionBadge');
            if (manual) badge.classList.add('checking');
            try {
                const res = await fetch('/api/check-update');
                if (!res.ok) {
                    if (manual) showUpdateToast('⚠️ <span class="update-text">確認に失敗しました</span><button class="update-btn-close" onclick="dismissUpdate()">&times;</button>');
                    return;
                }
                const data = await res.json();
                if (data.is_update_available) {
                    _updateDownloadUrl = data.download_url || '';
                    const releaseUrl = data.release_url || '#';
                    showUpdateToast(
                        '<span class="update-text">🆙 <strong>v' + data.latest_version + '</strong> が利用可能</span>' +
                        '<button class="update-btn update-btn-primary" onclick="performUpdate()">更新</button>' +
                        '<a href="' + releaseUrl + '" target="_blank" class="update-btn update-btn-secondary">詳細</a>' +
                        '<button class="update-btn-close" onclick="dismissUpdate()">&times;</button>'
                    );
                    badge.style.borderColor = 'var(--accent-green)';
                    badge.style.color = 'var(--accent-green)';
                } else if (manual) {
                    showUpdateToast(
                        '<span class="update-text">✅ 最新バージョンです（v' + _currentVersion + '）</span>' +
                        '<button class="update-btn-close" onclick="dismissUpdate()">&times;</button>',
                        'latest'
                    );
                    setTimeout(dismissUpdate, 4000);
                }
            } catch (e) {
                if (manual) showUpdateToast('⚠️ <span class="update-text">ネットワークエラー</span><button class="update-btn-close" onclick="dismissUpdate()">&times;</button>');
            } finally {
                badge.classList.remove('checking');
            }
        }

        function manualCheckForUpdates() {
            sessionStorage.removeItem('updateDismissed');
            checkForUpdates(true);
        }

        async function performUpdate() {
            const toast = document.getElementById('updateToast');
            toast.innerHTML = '<span class="update-text">⏳ ダウンロード中...</span>';
            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ download_url: _updateDownloadUrl }),
                });
                const data = await res.json();
                if (data.success) {
                    const restartMsg = data.restart ? '再起動します...' : '再起動してください';
                    showUpdateToast('<span class="update-text">✅ <strong>' + data.message + '</strong> — ' + restartMsg + '</span>');
                } else {
                    showUpdateToast(
                        '<span class="update-text">❌ ' + data.message + '</span>' +
                        '<button class="update-btn-close" onclick="dismissUpdate()">&times;</button>'
                    );
                }
            } catch (e) {
                showUpdateToast(
                    '<span class="update-text">❌ 通信エラー: ' + e.message + '</span>' +
                    '<button class="update-btn-close" onclick="dismissUpdate()">&times;</button>'
                );
            }
        }

        // バージョン表示
        fetch('/api/version').then(r => r.json()).then(d => {
            _currentVersion = d.version;
            document.getElementById('versionBadge').textContent = 'v' + d.version;
        }).catch(() => {});

        // ページ読み込み後にアップデートチェック
        if (!sessionStorage.getItem('updateDismissed')) {
            setTimeout(() => checkForUpdates(false), 3000);
        }
    </script>
</body>
</html>
