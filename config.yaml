monitor:
  interval_seconds: 5
  idle_threshold_seconds: 300
database:
  path: ~/.timereaper/timereaper.db
dashboard:
  port: 5555
  host: 127.0.0.1
browser_apps:
- Google Chrome
- Safari
- Firefox
- Arc
- Microsoft Edge
classification_rules:
  default_project_type: カスタム開発
  project_types:
  - type: カスタム開発
    keywords:
    - impulse-pj-
    cost_category: Impulse個別開発
  - type: プロダクト開発
    keywords:
    - (?<!-pj-)\bimpulse\b(?!-pj-)
    cost_category: Impulse製品開発（共通機能の改良・強化）
  sub_phases:
    テスト:
      keywords:
      - pytest
      - unittest
      - test.*result
      - jest
      - cypress
      match_target: search_text
    設計:
      keywords:
      - Figma
      - Sketch
      - Miro
      - draw\.io
      - whimsical
      match_target: app_name
    要件定義:
      keywords:
      - 要件
      - requirement
      - PRD
      match_target: search_text
    実装:
      keywords:
      - Visual Studio Code
      - IntelliJ
      - Xcode
      - Terminal
      - iTerm
      - Warp
      - Cursor
      - PyCharm
      - WebStorm
      match_target: app_name
  standalone_phases:
    meeting:
      keywords:
      - Zoom
      - Google Meet
      - meet\.google\.com
      - Microsoft Teams
      - FaceTime
    communication:
      keywords:
      - Slack
      - Discord
      - Messages
      - LINE
      - Telegram
    email:
      keywords:
      - Mail
      - Gmail
      - Outlook
      - mail\.google\.com
    documentation:
      keywords:
      - Notion
      - Confluence
      - Google Docs
      - docs\.google\.com
    planning:
      keywords:
      - Jira
      - Linear
      - Asana
      - Trello
      - GitHub Issues
    research:
      keywords:
      - stackoverflow\.com
      - qiita\.com
      - zenn\.dev
      - medium\.com
      - dev\.to
  # Slack チャンネル名 → プロジェクト推定ルール
  slack_channel_rules:
  - channels:
    - general
    - random
    - times-
    project: 全社活動
  # カレンダーイベントのうち meeting 扱いしないもの（除外パターン）
  calendar_non_meeting_patterns:
  - お昼
  - 昼食
  - ランチ
  - 不在
  - 移動
  - 出社
  - 開発$
  - 私用
  - 帰宅
  - Block
  - 子供
  - family
  - ^work$
  - 在宅
  - 健康診断
  - 休暇
  - 休み
  - レンタカー
  - 予定あり
  # カレンダーイベントタイトル → プロジェクト推定ルール
  calendar_project_rules:
  - keywords:
    - 全社
    - 全体会
    - 朝会
    - 定例
    - 1on1
    project: 全社活動
  cost_categories:
  - Impulse営業活動
  - Impulse技術調査・研究開発
  - Impulse導入作業
  - Impulseデータ分析・対応（PoC）
  - Impulse製品開発（共通機能の改良・強化）
  - Impulse個別開発
  - Impulse製品開発（メジャーVerUp）
  - Impulse保守開発・保守作業
  - 全社活動
  - 教育
  - その他
  task_categories:
  - 分析
  - カスタム開発-要件定義
  - カスタム開発-設計
  - カスタム開発-実装
  - カスタム開発-テスト
  - プロダクト開発-要件定義
  - プロダクト開発-設計
  - プロダクト開発-実装
  - プロダクト開発-テスト
  - 導入-基本設計
  - 導入-導入試験・検証
  - 導入-導入作業
  - 導入-トレーニング・顧客説明
  - meeting
  - communication
  - email
  - documentation
  - planning
  - research
  - other
mac_calendar:
  enabled: true
  sync_interval_seconds: 3600
  calendar_names:
  - ishimoto.shintaro@brains-tech.co.jp
google_calendar:
  enabled: false
  credentials_path: ~/.timereaper/credentials.json
  token_path: ~/.timereaper/token.json
  calendar_ids:
  - primary
slack:
  enabled: false
  token: ''
  workspace_name: ''
